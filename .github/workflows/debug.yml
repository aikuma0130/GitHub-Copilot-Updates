name: Debug Copilot

on:
  workflow_dispatch: # 手動実行対応

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Verify Copilot CLI installation
        run: copilot --version
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: 'Task 1: Update GitHub Copilot changelog'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          echo "=== GitHub Copilot アップデート情報の収集を開始 ==="
          copilot -p "GitHub Copilot について report.md に出力して" --allow-all
