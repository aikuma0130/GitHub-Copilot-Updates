name: Update Copilot Info

on:
  schedule:
    - cron: '0 23 * * *' # 毎日 23:00 UTC = 翌日 08:00 JST
  workflow_dispatch: # 手動実行対応

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Verify Copilot CLI installation
        run: copilot --version
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: 'Task 1: Update GitHub Copilot changelog'
        continue-on-error: true
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          echo "=== GitHub Copilot アップデート情報の収集を開始 ==="
          copilot -p "/research $(cat assets/prompts/update-copilot-changelog.md)" \
            --allow-all \
            --autopilot
          echo "=== タスク1 完了 ==="

      - name: 'Task 2: Update VSCode Copilot info'
        continue-on-error: true
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          echo "=== VSCode GitHub Copilot 関連アップデートの収集を開始 ==="
          copilot -p "/research $(cat assets/prompts/update-vscode-copilot.md)" \
            --allow-all \
            --autopilot
          echo "=== タスク2 完了 ==="

      - name: 'Task 3: Update Copilot CLI release info'
        continue-on-error: true
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          echo "=== GitHub Copilot CLI リリース情報の収集を開始 ==="
          copilot -p "/research $(cat assets/prompts/update-copilot-cli.md)" \
            --allow-all \
            --autopilot
          echo "=== タスク3 完了 ==="

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "変更なし — コミットをスキップします"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "変更を検出しました:"
            git diff --cached --stat
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update GitHub Copilot info (automated)

          Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push
